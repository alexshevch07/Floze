<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Floze AG — AI-powered desktop productivity app for Windows. Focus mode, distraction blocking, and smart task management." />
    <meta name="theme-color" content="#FFF8F0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Single shared typography system for RU + EN.
      Manrope (headings) and Inter (body) both ship full Cyrillic + Latin
      glyph sets — language switching only swaps text strings, never the
      font family, weight, size, letter-spacing, or line-height.
      display=optional eliminates FOUT / fallback-font jumps on load.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=optional" rel="stylesheet">
  </head>

  </body>
